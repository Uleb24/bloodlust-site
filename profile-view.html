<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | The Blood Lust</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav-bar">
  <a href="index.html" class="nav-brand">Blood Lust</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="stats.html">Stats</a></li>
    <li><a href="members.html">Members</a></li>
    <li><a href="apply.html">Apply</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <a id="auth-icon" class="auth-icon" href="login.html" title="Log In">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </svg>
  </a>

<article class="article pub-profile-article">
  <div id="profile-loading" style="color:#8b7c6f; font-style:italic; padding:80px 0; text-align:center;">Loading profile...</div>
  <div id="profile-error" style="display:none; padding:80px 20px; text-align:center;">
    <h1 class="article-title"><span>Not Found</span></h1>
    <p style="color:#b8b0a8; margin-top:20px;">We couldn't find a profile with that username.</p>
    <p style="margin-top:30px;"><a href="users.html" class="submit-button" style="display:inline-block; text-decoration:none;">Browse All Users</a></p>
  </div>

  <div id="profile-view" style="display:none;">
    <!-- Hero header -->
    <div class="pub-hero">
      <div class="pub-hero-bg"></div>
      <div class="pub-hero-content">
        <div class="pub-hero-avatar-wrapper">
          <div class="pub-hero-avatar" id="pub-avatar">
            <svg viewBox="0 0 24 24" width="96" height="96" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <div class="pub-hero-dot" id="pub-presence-dot" title="Offline"></div>
        </div>
        <div class="pub-hero-info">
          <div class="pub-hero-badges" id="pub-badges"></div>
          <h1 class="pub-hero-ign" id="pub-ign">—</h1>
          <div class="pub-hero-status" id="pub-status" style="display:none;"></div>
          <div class="pub-hero-meta" id="pub-meta"></div>
        </div>
      </div>
    </div>

    <!-- Info section: bio + favorite in rows -->
    <div id="pub-info-rows" class="pub-info-rows"></div>

    <!-- Active goals -->
    <div id="pub-goals-section" class="pub-section" style="display:none;">
      <h2 class="pub-section-title">Active Goals</h2>
      <div id="pub-goals-list" class="pub-goals-grid"></div>
    </div>

    <!-- Achievements -->
    <div id="pub-achievements-section" class="pub-section" style="display:none;">
      <h2 class="pub-section-title">Achievements</h2>
      <div id="pub-achievements-list" class="pub-achievements-grid"></div>
    </div>

    <!-- 25karma link (if set) -->
    <div id="pub-karma-row" class="pub-karma-row" style="display:none;">
      <a id="pub-karma-link" href="#" target="_blank" rel="noopener" class="pub-karma-btn">View Full Stats on 25karma →</a>
    </div>
  </div>
</article>

<footer class="site-footer">
  <div class="footer-brand">The <strong>Blood Lust</strong> Guild</div>
  <div class="footer-tagline">Hypixel Network</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="presence.js"></script>
<script>
function flagEmoji(code) {
  if (!code || code.length !== 2) return '';
  const cc = code.toUpperCase();
  const A = 0x1F1E6;
  return String.fromCodePoint(A + cc.charCodeAt(0) - 65) + String.fromCodePoint(A + cc.charCodeAt(1) - 65);
}

function escapePub(s) {
  if (s === null || s === undefined) return '';
  return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
}

function fmtFullDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function goalProgress(g) {
  const start = Number(g.start) || 0;
  const current = Number(g.current) || 0;
  const target = Number(g.target) || 0;
  if (target <= start) return 0;
  const range = target - start;
  const made = Math.max(0, current - start);
  return Math.min(100, (made / range) * 100);
}

function colorFromPct(pct) {
  if (pct >= 67) return 'pub-goal-green';
  if (pct >= 34) return 'pub-goal-yellow';
  return 'pub-goal-red';
}

function fmtPct(pct) {
  return (Math.round(pct * 10) / 10).toFixed(1).replace(/\.0$/, '') + '%';
}

function fmtNum(n) {
  return Number(n).toLocaleString('en-US');
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const username = params.get('u');

  if (!username) {
    showError();
    return;
  }

  const { data: profile, error } = await supabase
    .from('profiles')
    .select('*')
    .ilike('ign', username)
    .maybeSingle();

  if (error || !profile) {
    showError();
    return;
  }

  renderProfile(profile);
  checkPresence(profile.id);
}

function showError() {
  document.getElementById('profile-loading').style.display = 'none';
  document.getElementById('profile-error').style.display = 'block';
}

function renderProfile(p) {
  document.getElementById('profile-loading').style.display = 'none';
  document.getElementById('profile-view').style.display = 'block';

  document.title = `${p.ign || 'Profile'} | The Blood Lust`;

  // Avatar
  const avatarEl = document.getElementById('pub-avatar');
  if (p.avatar_url) {
    avatarEl.innerHTML = `<img src="${escapePub(p.avatar_url)}" alt="">`;
  }
  avatarEl.classList.add(`pub-hero-avatar-${p.role}`);

  // Role badges
  const badges = document.getElementById('pub-badges');
  let roleLabel = 'Player';
  let roleClass = 'pub-badge-player';
  if (p.role === 'staff') { roleLabel = 'Staff'; roleClass = 'pub-badge-staff'; }
  else if (p.role === 'member') { roleLabel = 'Member'; roleClass = 'pub-badge-member'; }
  badges.innerHTML = `<span class="pub-badge ${roleClass}">${roleLabel}</span>`;

  // Name (no inline flag here — flag goes in meta row)
  document.getElementById('pub-ign').textContent = p.ign || '(no name)';

  // Custom status
  if (p.custom_status) {
    const statusEl = document.getElementById('pub-status');
    statusEl.textContent = `"${p.custom_status}"`;
    statusEl.style.display = 'block';
  }

  // Meta row: country + member since
  const metaParts = [];
  if (p.country_code) {
    const flag = flagEmoji(p.country_code);
    if (flag) metaParts.push(`<span class="pub-meta-item">${flag} ${escapePub(p.country_code.toUpperCase())}</span>`);
  }
  metaParts.push(`<span class="pub-meta-item"><span class="pub-meta-icon">◆</span> Member since ${fmtDate(p.created_at)}</span>`);
  document.getElementById('pub-meta').innerHTML = metaParts.join('');

  // Info rows: bio + favorite gamemodes
  const infoRows = [];
  if (p.bio) {
    infoRows.push(`
      <div class="pub-info-row">
        <div class="pub-info-label">Bio</div>
        <div class="pub-info-value">${escapePub(p.bio)}</div>
      </div>
    `);
  }
  if (p.favorite_gamemodes) {
    infoRows.push(`
      <div class="pub-info-row">
        <div class="pub-info-label">Favorite Gamemodes</div>
        <div class="pub-info-value">${escapePub(p.favorite_gamemodes)}</div>
      </div>
    `);
  }
  document.getElementById('pub-info-rows').innerHTML = infoRows.join('');

  // Active goals (incomplete) — shown in red for incomplete per request, but colored by progress
  const goals = Array.isArray(p.goals) ? p.goals : [];
  if (goals.length > 0) {
    document.getElementById('pub-goals-section').style.display = 'block';
    const listEl = document.getElementById('pub-goals-list');
    listEl.innerHTML = goals.map(g => {
      const target = Number(g.target) || 0;
      const current = Number(g.current) || 0;
      const pct = goalProgress(g);
      const colorCls = colorFromPct(pct);
      return `
        <div class="pub-goal-card ${colorCls}">
          <div class="pub-goal-header">
            <div class="pub-goal-text">${escapePub(g.text || '')}</div>
            <div class="pub-goal-pct">${fmtPct(pct)}</div>
          </div>
          <div class="pub-goal-bar">
            <div class="pub-goal-fill ${colorCls}" style="width:${pct}%;"></div>
          </div>
          <div class="pub-goal-numbers">${fmtNum(current)} / ${fmtNum(target)}</div>
        </div>
      `;
    }).join('');
  }

  // Achievements (permanent)
  const achievements = Array.isArray(p.achievements) ? p.achievements : [];
  if (achievements.length > 0) {
    document.getElementById('pub-achievements-section').style.display = 'block';
    const listEl = document.getElementById('pub-achievements-list');
    listEl.innerHTML = achievements.map(a => {
      const date = a.achieved_at ? fmtFullDate(a.achieved_at) : '';
      return `
        <div class="pub-achievement-card">
          <div class="pub-achievement-icon">★</div>
          <div class="pub-achievement-body">
            <div class="pub-achievement-text">${escapePub(a.text || '')}</div>
            ${date ? `<div class="pub-achievement-date">${date}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // 25karma link
  if (p.karma_link) {
    document.getElementById('pub-karma-link').href = p.karma_link;
    document.getElementById('pub-karma-row').style.display = 'block';
  }
}

// Check presence via Realtime
async function checkPresence(targetUserId) {
  try {
    const channel = supabase.channel('online-users');
    channel.on('presence', { event: 'sync' }, () => {
      const state = channel.presenceState();
      const isOnline = Object.keys(state).includes(targetUserId);
      const dotEl = document.getElementById('pub-presence-dot');
      dotEl.classList.remove('pub-hero-dot-online', 'pub-hero-dot-offline');
      dotEl.classList.add(isOnline ? 'pub-hero-dot-online' : 'pub-hero-dot-offline');
      dotEl.title = isOnline ? 'Online now' : 'Offline';
    }).subscribe();

    setTimeout(() => { supabase.removeChannel(channel); }, 6000);
  } catch (e) {
    console.warn('Presence check failed:', e);
    document.getElementById('pub-presence-dot').classList.add('pub-hero-dot-offline');
  }
}

init();
</script>

</body>
</html>
