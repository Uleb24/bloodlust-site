<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In | The Blood Lust</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav-bar">
  <a href="index.html" class="nav-brand">Blood Lust</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="stats.html">Stats</a></li>
    <li><a href="members.html">Members</a></li>
    <li><a href="apply.html">Apply</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <a id="auth-icon" class="auth-icon" href="login.html" title="Log In">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </svg>
  </a>
</nav>

<article class="article login-article">
  <header class="article-header">
    <div class="article-eyebrow" id="auth-eyebrow">Members Area</div>
    <h1 class="article-title"><span id="auth-title">Log In</span></h1>
  </header>

  <form class="apply-form login-form" id="auth-form" onsubmit="return handleAuth(event)">

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="6" autocomplete="current-password">
    </div>

    <div class="auth-error" id="auth-error" style="display:none;"></div>

    <div class="form-submit-area">
      <button type="submit" class="submit-button" id="auth-submit">Log In</button>
      <div class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a href="#" id="auth-toggle-link">Sign up</a>
      </div>
    </div>

  </form>

</article>

<footer class="site-footer">
  <div class="footer-brand">The <strong>Blood Lust</strong> Guild</div>
  <div class="footer-tagline">Hypixel Network</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
let mode = 'login'; // or 'signup'

// Check if we should return to a specific page after login
const urlParams = new URLSearchParams(window.location.search);
const returnTo = urlParams.get('return');
const returnPage = returnTo === 'apply' ? 'apply.html' : 'dashboard.html';

const titleEl = document.getElementById('auth-title');
const eyebrowEl = document.getElementById('auth-eyebrow');
const submitBtn = document.getElementById('auth-submit');
const toggleTextEl = document.getElementById('auth-toggle-text');
const toggleLinkEl = document.getElementById('auth-toggle-link');
const passwordInput = document.getElementById('password');
const errorEl = document.getElementById('auth-error');

toggleLinkEl.addEventListener('click', (e) => {
  e.preventDefault();
  mode = (mode === 'login') ? 'signup' : 'login';
  if (mode === 'signup') {
    titleEl.textContent = 'Sign Up';
    eyebrowEl.textContent = 'Join The Site';
    submitBtn.textContent = 'Create Account';
    toggleTextEl.textContent = 'Already have an account?';
    toggleLinkEl.textContent = 'Log in';
    passwordInput.autocomplete = 'new-password';
  } else {
    titleEl.textContent = 'Log In';
    eyebrowEl.textContent = 'Members Area';
    submitBtn.textContent = 'Log In';
    toggleTextEl.textContent = "Don't have an account?";
    toggleLinkEl.textContent = 'Sign up';
    passwordInput.autocomplete = 'current-password';
  }
  errorEl.style.display = 'none';
});

async function handleAuth(e) {
  e.preventDefault();
  errorEl.style.display = 'none';

  const email = document.getElementById('email').value.trim();
  const password = passwordInput.value;

  submitBtn.disabled = true;
  submitBtn.textContent = mode === 'signup' ? 'Creating...' : 'Logging in...';

  try {
    if (mode === 'signup') {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) throw error;
      // If email confirmation is required, data.session will be null
      if (!data.session) {
        showSuccess('Please verify your email to continue. Check your inbox and click on the link sent by email to confirm your email address, then come back here to log in.');
        // Clear the password field; leave email so they can see which one they used
        passwordInput.value = '';
      } else {
        window.location.href = returnPage;
      }
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      window.location.href = returnPage;
    }
  } catch (err) {
    errorEl.textContent = err.message || 'Something went wrong.';
    errorEl.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = mode === 'signup' ? 'Create Account' : 'Log In';
  }

  return false;
}

function showSuccess(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  errorEl.classList.add('success');
  submitBtn.disabled = false;
  submitBtn.textContent = mode === 'signup' ? 'Create Account' : 'Log In';
}

// If already logged in, skip this page
supabase.auth.getUser().then(({ data: { user } }) => {
  if (user) window.location.href = returnPage;
});
</script>

</body>
</html>
